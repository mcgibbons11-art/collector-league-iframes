<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rip Night — Rip Watcher</title>
<script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
<script src="cl-kit.js"></script>
<script src="cl-api.js"></script>
<style>
  html,body{background:transparent!important;pointer-events:none}   /* click-through except the panel */
  .watch{position:fixed;top:60px;left:50%;transform:translateX(-50%);width:420px;max-width:94vw;pointer-events:auto;display:none}
  .watch.on{display:block}
  .live{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800}
  .live .dot{width:9px;height:9px;border-radius:50%;background:#35D0A3;box-shadow:0 0 8px #35D0A3;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .x{cursor:pointer;font-weight:800;font-size:16px;color:#fff;background:rgba(0,0,0,.25);border-radius:8px;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
  .body{padding:9px 11px 11px;max-height:60vh;overflow:auto}
  .rip{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #f3e6eb;border-radius:11px;padding:7px 9px;margin-bottom:6px}
  .rip.fresh{animation:slidein .4s ease both}
  @keyframes slidein{0%{transform:translateY(-6px);opacity:0}100%{transform:none;opacity:1}}
  .rip .who{font-weight:800;font-size:13px;color:#2a1f28;flex:none;min-width:62px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rip .mc{font-size:9px;font-weight:800;color:#fff;border-radius:6px;padding:2px 6px;text-transform:uppercase;flex:none}
  .rip .cards{display:flex;gap:4px;flex:1;flex-wrap:wrap}
  .rip .pill{font-size:11px;font-weight:800;color:#fff;border-radius:7px;padding:2px 7px}
  .empty{color:#b3a7ae;font-weight:600;font-size:12px;text-align:center;padding:16px}
</style>
</head>
<body>
<div class="watch" id="watch">
  <div class="cl-panel">
    <div class="cl-bar"><span class="t">RIP WATCHER</span><span class="live"><span class="dot"></span>LIVE</span><span class="x" id="close">&times;</span></div>
    <div class="body" id="feed"><div class="empty">Loading recent rips&hellip;</div></div>
  </div>
</div>
<script>
(function(){
  var RAR={EPIC:'#cf9a1c',RARE:'#7A52F0',UNCOMMON:'#3B7DF0',COMMON:'#8A94A6'};
  var MC={elite:'#1f5fb0',legendary:'#4f2fb0',grail:'#e06a10'};
  var watch=document.getElementById('watch'), feed=document.getElementById('feed');
  var seen={};   // purchase_id -> true, to flag fresh rips

  function show(){ watch.classList.add('on'); render(); }
  function hide(){ watch.classList.remove('on'); }
  document.getElementById('close').onclick=hide;

  function render(){
    if(!window.CLAPI || !CLAPI.configured){ feed.innerHTML='<div class="empty">Rip watcher offline.</div>'; return; }
    CLAPI.rips(15).then(function(r){
      var rips=(r&&r.rips)||[];
      if(!rips.length){ feed.innerHTML='<div class="empty">No packs ripped yet. Be the first at the Pack Shop.</div>'; return; }
      feed.innerHTML=rips.map(function(rp){
        var fresh=!seen[rp.purchase_id]; seen[rp.purchase_id]=true;
        var pills=rp.cards.map(function(c){ return '<span class="pill" style="background:'+(RAR[c.rarity]||'#8A94A6')+'">'+c.name+'</span>'; }).join('');
        return '<div class="rip'+(fresh?' fresh':'')+'"><span class="who">'+rp.player+'</span><span class="mc" style="background:'+(MC[rp.machine]||'#888')+'">'+rp.machine+'</span><span class="cards">'+pills+'</span></div>';
      }).join('');
    }).catch(function(){});
  }

  // toggle from the room: messages "ripwatch_1" (show) / "ripwatch_0" (hide) / "ripwatch_toggle"
  function handle(s){
    if(s.indexOf('ripwatch_')!==0) return;
    var v=s.substring(9);
    if(v==='toggle') watch.classList.contains('on')?hide():show();
    else if(v==='1'||v==='show') show();
    else hide();
  }
  if(window.PortalsSdk && PortalsSdk.setMessageListener){
    PortalsSdk.setMessageListener(function(m){ var s=(typeof m==='string')?m:JSON.stringify(m); try{var j=JSON.parse(m); if(typeof j==='string')s=j;}catch(e){} handle(s); });
  }
  setInterval(function(){ if(watch.classList.contains('on')) render(); }, 8000);  // refresh while open
  // dev/standalone: ?show=1 opens it immediately
  if(new URLSearchParams(location.search).get('show')==='1') show();
})();
</script>
</body>
</html>
