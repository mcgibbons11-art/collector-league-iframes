<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rip Night — Rip Watcher</title>
<script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
<script src="cl-kit.js"></script>
<script src="cl-api.js?v=2"></script>
<style>
  html,body{background:transparent!important;pointer-events:none}
  /* collapsed: a button anchored bottom-right of this corner iframe */
  .tab{position:fixed;right:14px;bottom:14px;pointer-events:auto;cursor:pointer;display:inline-flex;align-items:center;gap:8px;
       font-family:'Baloo 2',system-ui,sans-serif;font-weight:800;font-size:14px;color:#fff;
       background:linear-gradient(160deg,#7a52f0,#4f2fb0);border:2px solid #FFCB05;border-radius:13px;padding:10px 15px;box-shadow:0 5px 0 #3a2080,0 8px 16px rgba(0,0,0,.3)}
  .tab:active{transform:translateY(2px);box-shadow:0 3px 0 #3a2080}
  .tab .dot{width:9px;height:9px;border-radius:50%;background:#35D0A3;box-shadow:0 0 8px #35D0A3;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .tab .n{background:#FFCB05;color:#5a4500;border-radius:7px;font-size:11px;padding:1px 6px;min-width:14px;text-align:center}
  body.open .tab{display:none}
  .panel{position:fixed;right:14px;bottom:14px;width:404px;max-width:94vw;pointer-events:auto;display:none}
  .panel.on{display:block;animation:rise .22s ease both}
  @keyframes rise{0%{transform:translateY(8px);opacity:0}100%{transform:none;opacity:1}}
  .live{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800}
  .live .dot{width:9px;height:9px;border-radius:50%;background:#35D0A3;box-shadow:0 0 8px #35D0A3;animation:pulse 1.4s ease-in-out infinite}
  .x{cursor:pointer;font-weight:800;font-size:17px;color:#fff;background:rgba(0,0,0,.25);border-radius:8px;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
  .sub{background:rgba(255,255,255,.72);font-size:11px;font-weight:700;color:#6a5560;padding:5px 12px;border-bottom:1px solid #f0dde3}
  .feed{padding:8px 10px 11px;max-height:52vh;overflow:auto}
  .rip{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #f3e6eb;border-radius:11px;padding:7px 9px;margin-bottom:6px}
  .rip.fresh{animation:slidein .45s ease both}
  @keyframes slidein{0%{transform:translateY(-7px);opacity:0}100%{transform:none;opacity:1}}
  .rip .who{font-weight:800;font-size:13px;color:#2a1f28;flex:none;min-width:58px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rip .mc{font-size:9px;font-weight:800;color:#fff;border-radius:6px;padding:2px 6px;text-transform:uppercase;flex:none}
  .rip .cards{display:flex;gap:4px;flex:1;flex-wrap:wrap}
  .rip .pill{font-size:11px;font-weight:800;color:#fff;border-radius:7px;padding:2px 7px}
  .empty{color:#b3a7ae;font-weight:600;font-size:12px;text-align:center;padding:16px}
</style>
</head>
<body>
<div class="tab" id="tab"><span class="dot"></span>RIP WATCHER<span class="n" id="tabn">&middot;</span></div>
<div class="panel" id="panel">
  <div class="cl-panel">
    <div class="cl-bar"><span class="t">RIP WATCHER</span><span class="live"><span class="dot"></span>LIVE</span><span class="x" id="close">&times;</span></div>
    <div class="sub">What everyone in the room just pulled.</div>
    <div class="feed" id="feed"><div class="empty">Loading&hellip;</div></div>
  </div>
</div>
<script>
(function(){
  var RAR={EPIC:'#cf9a1c',RARE:'#7A52F0',UNCOMMON:'#3B7DF0',COMMON:'#8A94A6'};
  var MC={elite:'#1f5fb0',legendary:'#4f2fb0',grail:'#e06a10'};
  var panel=document.getElementById('panel'), feed=document.getElementById('feed'), tabn=document.getElementById('tabn');
  var seen={};
  function render(){
    if(!window.CLAPI || !CLAPI.configured){ feed.innerHTML='<div class="empty">Rip watcher offline.</div>'; return; }
    CLAPI.rips(15).then(function(r){
      var rips=(r&&r.rips)||[]; tabn.textContent=rips.length;
      if(!rips.length){ feed.innerHTML='<div class="empty">No packs ripped yet. Be the first at the Pack Shop.</div>'; return; }
      feed.innerHTML=rips.map(function(rp){
        var fresh=!seen[rp.purchase_id]; seen[rp.purchase_id]=true;
        var pills=rp.cards.map(function(c){ return '<span class="pill" style="background:'+(RAR[c.rarity]||'#8A94A6')+'">'+c.name+'</span>'; }).join('');
        return '<div class="rip'+(fresh?' fresh':'')+'"><span class="who">'+rp.player+'</span><span class="mc" style="background:'+(MC[rp.machine]||'#888')+'">'+rp.machine+'</span><span class="cards">'+pills+'</span></div>';
      }).join('');
    }).catch(function(){});
  }
  function show(){ panel.classList.add('on'); document.body.classList.add('open'); render(); }
  function hide(){ panel.classList.remove('on'); document.body.classList.remove('open'); }
  document.getElementById('tab').onclick=show;
  document.getElementById('close').onclick=hide;
  render();                                   // prime the count on the button
  setInterval(render, 8000);                  // keep count + feed fresh
})();
</script>
</body>
</html>
