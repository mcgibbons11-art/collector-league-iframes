<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Collector League — Rip Night iframes</title>
<style>
  :root{ --red:#E3350D; --blue:#3B9DF0; --yellow:#FFCB05; --green:#3DBE5A; --ink:#10162B; }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(120% 90% at 50% 0%,#ffd9d0,#0c1124 70%);
    font-family:'Trebuchet MS','Segoe UI',sans-serif;color:#fff;display:grid;place-items:center;padding:24px;}
  .card{width:min(560px,94vw);background:linear-gradient(180deg,#10162B,#1B2540);border:4px solid #fff;
    border-radius:24px;box-shadow:0 18px 50px rgba(0,0,0,.5);overflow:hidden;}
  header{display:flex;align-items:center;gap:12px;background:linear-gradient(90deg,var(--red),#8e1d07);
    padding:16px 20px;border-bottom:4px solid #fff;}
  .ball{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 50% 38%,#fff 0 32%,var(--yellow) 33% 100%);border:3px solid #fff;}
  h1{margin:0;font-size:19px;font-weight:900;letter-spacing:1px;}
  h1 small{display:block;font-size:10px;letter-spacing:3px;opacity:.9;}
  .links{padding:16px;display:grid;gap:12px;}
  a{display:flex;align-items:center;gap:12px;text-decoration:none;color:#fff;font-weight:800;
    padding:14px 16px;border-radius:14px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);
    transition:transform .12s,background .12s;}
  a:hover{transform:translateY(-2px);}
  a .dot{width:14px;height:14px;border-radius:50%;}
  .note{padding:0 18px 18px;font-size:11px;color:#9fb0d6;text-align:center;}
</style>
</head>
<body>
  <div class="card">
    <header><div class="ball"></div><h1>RIP NIGHT IFRAMES<small>COLLECTOR LEAGUE</small></h1></header>
    <div class="links">
      <a href="scoreboard.html"><span class="dot" style="background:#E3350D"></span>Live Scoreboard HUD</a>
      <a href="lineup.html"><span class="dot" style="background:#3DBE5A"></span>Lineup Builder</a>
      <a href="gameover.html"><span class="dot" style="background:#FFCB05"></span>Result / Game-Over Screen</a>
      <a href="host-console.html"><span class="dot" style="background:#3B9DF0"></span>Host Console</a>
    </div>
    <div class="note">Original Collector League UIs. Embed these in Portals via the Iframe effect (add ?v=N to bust cache).</div>
  </div>
</body>
</html>
